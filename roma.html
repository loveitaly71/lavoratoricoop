<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Lavoratori Coop</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
a { color:blue; }
</style>
</head>

<body>

<h1>Elenco Cooperative</h1>

<div id="list"></div>

<script>
// === 1. LISTA REALTÀ (la tua originale) ===
const entities = [
"Aldia Cooperativa Sociale",
"Agorà Soc. Coop. Soc.",
"AISS Soc. Coop.",
"Apriti Sesamo Cooperativa Sociale",
"Arca di Noè Cooperativa Sociale",
"Ars Educandi",
"Consorzio Blu",
"Domus Cooperativa Sociale",
"Eureka Cooperativa",
"Kairos Cooperativa Sociale",
"Meta Cooperativa Sociale",
"Medihospes",
"Parsifal",
"Nuova SAIR",
"Area Sociale"
];

// === 2. CREA UI ===
const container = document.getElementById("list");

entities.forEach(name => {

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${name}</h3>
    <p class="site">🔍 Ricerca sito in corso...</p>
  `;

  container.appendChild(div);

  // === 3. AUTO-RICERCA SITO ===
  fetch(`https://api.allorigins.win/get?url=` +
        encodeURIComponent("https://www.google.com/search?q=" + name + " cooperativa sociale sito ufficiale"))
    .then(r => r.json())
    .then(data => {

      // estrazione semplice link (versione base)
      const match = data.contents.match(/https?:\/\/(www\.)?[a-zA-Z0-9\-]+\.[a-z]{2,}/);

      if (match) {
        div.querySelector(".site").innerHTML =
          `🌐 Sito trovato: <a href="${match[0]}" target="_blank">${match[0]}</a>`;
      } else {
        div.querySelector(".site").innerHTML =
          "⚠️ Sito non trovato";
      }

    });

});
</script>

</body>
</html>
